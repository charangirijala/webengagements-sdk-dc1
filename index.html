<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Engagements SDK DC1</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Web Connector Schema</h1>
      <div id="schema-container"></div>
      <div class="mt-4">
        <button id="opt-in" class="btn btn-success me-2">Opt In</button>
        <button id="opt-out" class="btn btn-danger">Opt Out</button>
        <div id="consent-status" class="mt-2"></div>
      </div>
      <div class="mt-4">
        <h5>Catalog Events</h5>
        <button id="catalog-web" class="btn btn-info me-2">
          Send Catalog Event (Web Channel)
        </button>
        <button id="catalog-mobile" class="btn btn-warning me-2">
          Send Catalog Event (Mobile Channel)
        </button>
        <div id="catalog-status" class="mt-2"></div>
      </div>
      <div class="mt-4 p-3 bg-white rounded shadow-sm">
        <p class="mb-2">Useful resources for building this site:</p>
        <ul class="mb-0">
          <li>
            <a
              href="https://www.youtube.com/watch?v=HtNLQdsQECk"
              target="_blank"
              rel="noopener noreferrer"
            >
              YouTube video reference
            </a>
          </li>
          <li>
            <a
              href="https://developer.salesforce.com/docs/data/salesforce-interactions-sdk/guide/c360a-api-event-structure.html"
              target="_blank"
              rel="noopener noreferrer"
            >
              Salesforce Interactions SDK event structure guide
            </a>
          </li>
        </ul>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.c360a.salesforce.com/beacon/c360a/2d1d2913-6f72-4691-9fd0-1eae68e072d7/scripts/c360a.min.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
